name: Prompt Eval Gate

on:
  pull_request:
    branches:
      - main
    paths:
      - prompts/**

jobs:
  eval:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Promptfoo
        run: npm install -g promptfoo

      - name: Run Promptfoo eval
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
        run: promptfoo eval --config promptfooconfig.yaml

      - name: Check accuracy threshold
        run: |
          PASS_RATE=$(python3 -c "
          import json
          with open('results/eval-results.json') as f:
              data = json.load(f)
          print(data['stats']['passRate'])
          ")
          echo "Pass rate: ${PASS_RATE}"
          THRESHOLD=0.85
          PASS_RATE_NUM=$(python3 -c "val=float('${PASS_RATE}'); print(val)")
          THRESHOLD_NUM=$(python3 -c "val=float('${THRESHOLD}'); print(val)")
          if [ "$(python3 -c "print(1 if ${PASS_RATE_NUM} < ${THRESHOLD_NUM} else 0)")" = "1" ]; then
            echo "::error::Accuracy ${PASS_RATE} is below threshold ${THRESHOLD}. Merge blocked."
            exit 1
          fi
          echo "::notice::Accuracy ${PASS_RATE} meets threshold ${THRESHOLD}. Eval passed."