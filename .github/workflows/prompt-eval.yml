name: Prompt Eval Gate

on:
  pull_request:
    paths:
      - 'prompts/**'

jobs:
  eval:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install Promptfoo
        run: npm install -g promptfoo
      - name: Run eval
        run: promptfoo eval --config promptfooconfig.yaml
      - name: Check accuracy threshold
        run: |
          ACCURACY=$(cat results/eval-results.json | jq '.stats.passRate')
          echo "Accuracy: $ACCURACY"
          if (( $(echo "$ACCURACY < 0.85" | bc -l) )); then
            echo "Eval gate FAILED: accuracy $ACCURACY is below 0.85 threshold"
            exit 1
          fi
          echo "Eval gate PASSED: accuracy $ACCURACY meets 0.85 threshold"