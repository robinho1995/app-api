name: Security Pipeline

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  sonar-scan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run SonarQube Scanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=app-api \
            -Dsonar.sources=app \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.login=${SONAR_TOKEN} \
            -Dsonar.qualitygate.wait=true || echo "::warning::SonarQube quality gate failed"

  trivy-scan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        run: trivy fs --format json --output trivy-results.json --severity CRITICAL,HIGH . || true

      - name: Run Trivy config scan
        run: trivy config --severity CRITICAL,HIGH k8s/ || true

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

  security-agent:
    runs-on: self-hosted
    needs: [sonar-scan, trivy-scan]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download Trivy results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results

      - name: Install Python dependencies
        run: pip3 install PyGithub openai requests -r requirements.txt

      - name: Run Security Agent
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT: app-api
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          AGENT_PAT: ${{ secrets.AGENT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python3 agent/security_agent.py