name: Deploy app-api

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - destroy

jobs:
  test:
    runs-on: self-hosted
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip3 install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run lint
        run: |
          pip3 install ruff
          ruff check app/ || true

      - name: Run tests
        run: pytest tests/ -v --tb=short -x || true

  build:
    runs-on: self-hosted
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app-api:latest -t app-api:${{ github.sha }} .

      - name: Tag image with run number
        run: docker tag app-api:latest app-api:build-${{ github.run_number }}

  deploy:
    runs-on: self-hosted
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Load image into k3d
        run: k3d image import app-api:latest --cluster mba-cluster

      - name: Deploy to k3d
        run: kubectl apply -f k8s/

      - name: Wait for rollout - app-api
        run: kubectl rollout status deployment/app-api-deployment -n demo-app-mba --timeout=120s

      - name: Wait for rollout - postgresql
        run: kubectl rollout status statefulset/postgresql -n demo-app-mba --timeout=120s || true

      - name: Wait for rollout - redis
        run: kubectl rollout status statefulset/redis -n demo-app-mba --timeout=120s || true

      - name: Smoke test
        run: |
          kubectl port-forward svc/app-api-service -n demo-app-mba 8000:8000 &
          PF_PID=$!
          sleep 5
          curl -sf http://localhost:8000/health || echo "::warning::Health check failed"
          curl -sf http://localhost:8000/ || echo "::warning::Root check failed"
          kill $PF_PID 2>/dev/null || true

  manual-deploy:
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app-api:latest -t app-api:${{ github.sha }} .

      - name: Load image into k3d
        run: k3d image import app-api:latest --cluster mba-cluster

      - name: Deploy to k3d
        run: kubectl apply -f k8s/

      - name: Wait for rollout - app-api
        run: kubectl rollout status deployment/app-api-deployment -n demo-app-mba --timeout=120s

      - name: Wait for rollout - postgresql
        run: kubectl rollout status statefulset/postgresql -n demo-app-mba --timeout=120s || true

      - name: Wait for rollout - redis
        run: kubectl rollout status statefulset/redis -n demo-app-mba --timeout=120s || true

      - name: Smoke test
        run: |
          kubectl port-forward svc/app-api-service -n demo-app-mba 8000:8000 &
          PF_PID=$!
          sleep 5
          curl -sf http://localhost:8000/health || echo "::warning::Health check failed"
          curl -sf http://localhost:8000/ || echo "::warning::Root check failed"
          kill $PF_PID 2>/dev/null || true

  destroy:
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    steps:
      - name: Delete all k8s resources
        run: |
          kubectl delete all --all -n demo-app-mba || true
          kubectl delete statefulset postgresql redis -n demo-app-mba || true