name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: python3 -m pip install -r requirements.txt

      - name: Install tools
        run: python3 -m pip install ruff pytest

      - name: Ruff
        run: python3 -m ruff check app/ tests/

      - name: Tests
        run: python3 -m pytest tests/ -v