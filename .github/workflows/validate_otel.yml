name: Validate OTel Instrumentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install pytest pytest-asyncio ruff

      - name: Run ruff check
        run: ruff check app/ agent/ tests/

      - name: Run OTel instrumentation tests
        run: python3 -m pytest tests/test_otel_instrumentation.py -v

      - name: Validate semantic conventions
        run: python3 -m pytest tests/test_otel_instrumentation.py::TestSemanticConventions -v

      - name: Run MCP query tests
        run: python3 -m pytest tests/test_mcp_queries.py -v