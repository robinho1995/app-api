name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: python3 -m pytest tests/ -v

  build:
    name: Build Docker Image
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t app-api:${{ github.sha }} .

      - name: Test container starts
        run: docker run --rm -d --name app-api-test -p 8000:8000 app-api:${{ github.sha }} && sleep 5 && curl -sf http://localhost:8000/health && docker stop app-api-test