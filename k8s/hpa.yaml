apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-api-hpa
  namespace: demo-app-mba
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-api-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: cpu
        target:
          type: AverageValue
          averageValue: 350m
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300