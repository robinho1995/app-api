description: Eval gate para system prompt de classificação de tickets
providers:
  - id: openai:qwen/qwen3.5-35b-a3b
    config:
      apiBaseUrl: http://localhost:1234/v1
      temperature: 0.1
      max_tokens: 200

prompts:
  - prompts/system.md

tests: tests/eval.yaml

defaultTest:
  assert:
    - type: is-json
    - type: contains-json
      value:
        category:
          type: string
        confidence:
          type: number
        reasoning:
          type: string
        suggested_priority:
          type: string

outputPath: results/eval-results.json